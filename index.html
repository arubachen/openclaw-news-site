<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>情报站</title>
    <meta
      name="description"
      content="把运营商动态、市场快讯、竞品情报、软通动态和招投标内容集中展示成一个可检索的静态情报站。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">OPENCLAW · STATIC INTELLIGENCE SITE</p>
          <h1>情报站</h1>
          <p class="subline">
            把 Discord 里的资讯卡，收成一个能按分类、日期、标签和关键词检索的静态站。
          </p>
        </div>
        <div class="top-actions">
          <a class="ghost-btn" href="#/all">查看全部</a>
          <a class="ghost-btn" href="#/channel/市场快讯">市场快讯</a>
        </div>
      </header>

      <section class="hero-card">
        <div class="hero-copy">
          <p class="section-label">站点说明</p>
          <h2>先做轻站，再接自动化发布</h2>
          <p>
            当前版本是一个纯静态前端：直接读取 <code>data/news.json</code> 渲染。先把“可看、可搜、可归档”跑通，后面再把 cron 产物自动落到同一份数据里。
          </p>
        </div>
        <div id="hero-stats" class="hero-stats"></div>
      </section>

      <section class="toolbar">
        <div class="search-box">
          <label for="search-input">搜索</label>
          <input id="search-input" type="search" placeholder="搜标题、摘要、标签、来源..." />
        </div>
        <div id="channel-chips" class="chips"></div>
      </section>

      <main class="layout">
        <aside class="sidebar">
          <section class="panel">
            <div class="panel-head">
              <h3>最近日期</h3>
            </div>
            <div id="date-links" class="stack-links"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>高频标签</h3>
            </div>
            <div id="tag-cloud" class="chips tag-cloud"></div>
          </section>

          <section class="panel tip-panel">
            <div class="panel-head">
              <h3>后续可接</h3>
            </div>
            <ul>
              <li>cron 自动写入 JSON</li>
              <li>GitHub Pages 自动发布</li>
              <li>静态 RSS / JSON Feed</li>
              <li>只读分享页 / 内部归档</li>
            </ul>
          </section>
        </aside>

        <section class="content">
          <div id="route-title" class="route-title"></div>
          <div id="content-root"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
