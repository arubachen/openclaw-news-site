<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>情报站</title>
    <meta
      name="description"
      content="聚合运营商动态、市场快讯、竞品情报、软通动态与招投标实时信息。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="masthead">
        <div class="brand-block">
          <p class="eyebrow">INTELLIGENCE DESK · STATIC ARCHIVE</p>
          <h1>情报站</h1>
          <p class="subline">聚合运营商动态、市场快讯、竞品情报、软通动态与招投标实时信息</p>
        </div>

        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换主题" title="切换主题"></button>
      </header>

      <section class="toolbar">
        <div class="toolbar-search">
          <label for="search-input">检索</label>
          <input id="search-input" type="search" placeholder="搜标题、摘要、标签、来源、点评..." />
        </div>

        <div class="toolbar-filters">
          <div class="toolbar-group">
            <span class="toolbar-label">频道</span>
            <div id="channel-chips" class="chips center-chips"></div>
          </div>
          <div class="toolbar-group">
            <span class="toolbar-label">价值</span>
            <div id="score-chips" class="chips center-chips"></div>
          </div>
        </div>
      </section>

      <main class="layout">
        <aside class="sidebar">
          <section class="panel overview-panel">
            <div class="panel-head">
              <h3>概览</h3>
            </div>
            <div id="overview-summary" class="overview-mini-grid"></div>
            <div class="channel-block">
              <div class="panel-subhead">频道概览</div>
              <div id="channel-summary" class="channel-summary"></div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>最近日期</h3>
            </div>
            <div id="date-links" class="stack-links"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>高频标签</h3>
            </div>
            <div id="tag-cloud" class="chips tag-cloud"></div>
          </section>
        </aside>

        <section class="content">
          <div id="route-title" class="route-title"></div>
          <div id="content-root"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
