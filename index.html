<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#e60000" />
    <title>运营商资讯</title>
    <meta
      name="description"
      content="聚合电信运营商动态、市场快讯、招投标、竞对情报与软通动态实时信息。"
    />
    <link rel="icon" href="./assets/favicon.svg?v=20260325-1858" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=20260326-0812" />
  </head>
  <body>
    <div class="shell">
      <header class="masthead">
        <div class="masthead-main">
          <div class="brand-block">
            <p class="eyebrow">NEWS DESK · STATIC ARCHIVE</p>
            <h1>TTA运营商行业资讯站</h1>
            <p class="subline">聚合电信运营商动态、市场快讯、招投标、竞对情报与软通动态实时信息</p>
          </div>

          <div class="header-controls">
            <div class="search-control-row">
              <div class="toolbar-search compact-search">
                <div class="search-input-wrap">
                  <input id="search-input" type="search" placeholder="搜索标题、摘要、标签、来源、点评..." />
                  <span class="search-icon" aria-hidden="true">⌕</span>
                </div>
              </div>

              <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换主题" title="切换主题"></button>
            </div>

            <div class="type-tabs-row">
              <div id="channel-chips" class="chips inline-chips"></div>
            </div>
          </div>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <section class="panel overview-panel compact-panel">
            <div class="panel-head">
              <h3>业务匹配</h3>
            </div>
            <div id="score-summary" class="stack-links metric-links"></div>
          </section>

          <section class="panel compact-panel">
            <div class="panel-head">
              <h3>最近日期</h3>
            </div>
            <div id="date-links" class="stack-links"></div>
          </section>

          <section class="panel compact-panel">
            <div class="panel-head">
              <h3>高频标签</h3>
            </div>
            <div id="tag-cloud" class="chips tag-cloud"></div>
          </section>
        </aside>

        <section class="content">
          <div id="route-title" class="route-title"></div>
          <div id="content-root"></div>
        </section>
      </main>
    </div>

    <button id="back-to-top" class="back-to-top" type="button" aria-label="返回顶部" title="返回顶部">
      <svg class="back-to-top-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 18V7" />
        <path d="M7.5 11.5 12 7l4.5 4.5" />
      </svg>
    </button>

    <script type="module" src="./app.js?v=20260326-0800"></script>
  </body>
</html>
